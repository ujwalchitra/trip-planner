services:
  - type: web
    name: where-ujwal-wants-to-go
    runtime: docker
    plan: free
    repo: https://github.com/ujwalchitra/trip-planner
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: ROAMLY_SECRET
        generateValue: true
      - key: ROAMLY_DB_PATH
        value: /tmp/roamly.db
      - key: OSM_USER_AGENT
        value: where-ujwal-wants-to-go/1.0
